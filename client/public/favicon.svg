<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square with gradient -->
  <rect width="64" height="64" rx="14" fill="url(#grad)" />

  <!-- Camera body -->
  <rect x="10" y="20" width="44" height="30" rx="5" fill="white" fill-opacity="0.18" stroke="white" stroke-width="2.2"/>

  <!-- Lens outer ring -->
  <circle cx="32" cy="35" r="10" fill="white" fill-opacity="0.15" stroke="white" stroke-width="2.2"/>

  <!-- Lens inner -->
  <circle cx="32" cy="35" r="6" fill="white" fill-opacity="0.35"/>

  <!-- Lens glint -->
  <circle cx="29.5" cy="32.5" r="1.6" fill="white" fill-opacity="0.7"/>

  <!-- Viewfinder bump (top) -->
  <rect x="24" y="14" width="16" height="8" rx="3.5" fill="white" fill-opacity="0.25" stroke="white" stroke-width="2"/>

  <!-- Flash dot -->
  <circle cx="49" cy="24" r="2.2" fill="white" fill-opacity="0.6"/>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
</svg>
